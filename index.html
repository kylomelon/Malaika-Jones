<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="I am Malaika Jones, a Korea based South African UGC creator, model, and actress creating beauty, hair, tech, and life in Korea content for global brands."
    />
    <meta property="og:title" content="Malaika Jones UGC Creator" />
    <meta
      property="og:description"
      content="I create authentic UGC, social storytelling, and campaigns made for global audiences from Korea."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/uploads/hero-landscape.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/uploads/Malaika.png" />
    <link rel="apple-touch-icon" href="/uploads/Malaika.png" />
    <title>Malaika Jones | UGC Creator</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      action="/thank-you"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="brand" />
      <input name="campaign_type" />
      <input name="budget" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
